name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Test
        run: uv run python -m pytest

      - name: Build
        run: uv build --sdist --wheel

      - name: Inspect artifacts
        run: |
          python - <<'PY'
          import pathlib
          import tarfile
          import zipfile

          forbidden = (
              ".venv/",
              ".pytest_cache/",
              "__pycache__/",
              "tests/",
              "valmar-core/",
              "developer-docs/",
              ".env",
          )

          for archive in sorted(pathlib.Path("dist").iterdir()):
              if archive.suffix == ".whl":
                  with zipfile.ZipFile(archive) as zf:
                      names = zf.namelist()
              elif archive.name.endswith(".tar.gz"):
                  with tarfile.open(archive) as tf:
                      names = tf.getnames()
              else:
                  raise SystemExit(f"Unexpected artifact: {archive}")

              bad = [
                  name
                  for name in names
                  if any(part in name for part in forbidden) or name.endswith(".pyc")
              ]
              if bad:
                  raise SystemExit(f"{archive} contains forbidden files: {bad}")

              print(f"{archive}:")
              for name in names:
                  print(f"  {name}")
          PY
