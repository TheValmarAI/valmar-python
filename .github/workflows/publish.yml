name: Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Test
        run: uv run python -m pytest

      - name: Build
        run: uv build --sdist --wheel

      - name: Smoke install
        run: |
          python -m venv /tmp/valmar-python-smoke
          /tmp/valmar-python-smoke/bin/python -m pip install dist/*.whl
          /tmp/valmar-python-smoke/bin/python - <<'PY'
          import valmar
          from valmar import Valmar

          assert valmar.__version__
          client = Valmar(
              api_key="valmr_proj_sk_test",
              base_url="https://api.example.test",
              organization_id="11111111-1111-4111-8111-111111111111",
              project_id="22222222-2222-4222-8222-222222222222",
          )
          client.close()
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
